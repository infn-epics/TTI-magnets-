Terminator = CR LF;
ReplyTimeout = 3000;
ReadTimeout = 500;
ExtraInput = Ignore;

# voltege
getVoltageRbv {
    out "VO?";
    in " %fV";
}

getVoltageSetpoint {
    out "V?";
    in "V %f";
}

setVoltage {
    out "V %.3f";
}

# current
setCurrent {
    out "I %.3f";
}

getCurrent {
    out "IO?";
    in " %fA";
}

getCurrentSetpoint {
    out "I?";
    in "I %f";
}
# output
setOutput {
    out "OP %d";
}
# ovp

getOVP {
    out "OVP?";
    in "OVP %f";
}

setOVP {
    out "OVP %.3f";
}

# potenza 
getPower {
    out "POWER?";
    in " %f";
}

# identitificazione device

getIdentity {
    out "*IDN?";
    in "%#s";
}

# reset

resetInstrument {
    out "*RST";
}

# stato errori
getStatusByte {         #stato device
    out "*STB?";
    in "%d";
}

clearStatus {
    out "*CLS";
}

getEventStatus {         #stato errori
    out "*ESR?";
    in "%d";
}

getLimitStatus {
    out "LSR?";
    in "%d";
}